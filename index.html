<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MPC — Yeezy Edition</title>
<style>
    :root{
        --bg:#d9cfb4;
        --device-bg:#c7bb98;
        --panel-bg:#b3a683;
        --pad-bg:#8d8168;
        --pad-border:#69604c;
        --pad-bottom:#453e30;
        --ink:#16130e;
        --ink-soft:#4a4432;
        --accent:#d6491d;
        --accent-ink:#fff9ee;
        --screen-bg:#131110;
        --screen-text:#eab35f;
        --line: rgba(0,0,0,0.18);
    }

    body.theme-black{
        --bg:#0c0c0b;
        --device-bg:#191815;
        --panel-bg:#221f1a;
        --pad-bg:#2b2822;
        --pad-border:#48423a;
        --pad-bottom:#000000;
        --ink:#e7dcc0;
        --ink-soft:#b8ab88;
        --accent:#ff5a1f;
        --accent-ink:#0c0c0b;
        --screen-bg:#000000;
        --screen-text:#ff6a2b;
        --line: rgba(255,255,255,0.12);
    }

    *{ box-sizing: border-box; }

    body {
        background-color: var(--bg);
        color: var(--ink);
        font-family: 'Helvetica Neue', Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        margin: 0;
        padding: 10px;
        -webkit-user-select: none;
        user-select: none;
        width: 100vw;
        overflow-x: hidden;
        transition: background-color .25s ease, color .25s ease;
    }

    .device {
        width: 100%;
        max-width: 460px;
        background: var(--device-bg);
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
        border: 1px solid var(--line);
    }

    .brand-row {
        display:flex;
        align-items:baseline;
        justify-content:space-between;
        padding: 2px 4px 8px;
    }
    .brand-row h1 {
        margin:0;
        font-size: clamp(24px, 8vw, 34px);
        font-weight: 900;
        letter-spacing: -1px;
        color: var(--ink);
        text-transform: uppercase;
    }
    .brand-row span {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 3px;
        color: var(--ink-soft);
        text-transform: uppercase;
        white-space: nowrap;
    }

    .hazard-bar {
        height: 6px;
        border-radius: 3px;
        margin: 0 4px 10px;
        background: repeating-linear-gradient(
            45deg,
            var(--ink) 0px, var(--ink) 8px,
            var(--accent) 8px, var(--accent) 16px
        );
        opacity: 0.9;
    }

    .screen {
        background-color: var(--screen-bg);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 8px;
        box-shadow: inset 0 0 14px rgba(0,0,0,0.6);
        text-align: center;
        box-sizing: border-box;
    }

    .screen-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 6px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 9px;
        color: var(--screen-text);
        font-weight: bold;
        gap: 6px;
        letter-spacing: 0.5px;
    }
    .screen-row:first-child{ margin-top:0; }

    .screen-row input[type="range"] {
        width: 110px;
        accent-color: var(--accent);
    }

    .seq-btns { display: flex; gap: 4px; }

    .btn-seq {
        background: #2a1f14;
        color: var(--screen-text);
        border: 1px solid #000;
        padding: 5px 9px;
        font-size: 8px;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        cursor: pointer;
        border-radius: 2px;
        letter-spacing: 0.5px;
    }
    .btn-seq.recording { background: var(--accent); color: #fff; animation: pulse 1s infinite; }
    .btn-seq.playing-loop { background: #8a6d1f; color: #fff; }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        75% { transform: translateX(3px); }
    }

    .controls-top, .bank-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
    }

    .btn-control {
        background: var(--ink);
        color: var(--bg);
        border: none;
        border-bottom: 3px solid rgba(0,0,0,0.4);
        padding: 8px 4px;
        border-radius: 3px;
        font-size: 8px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex: 1;
    }
    .btn-control:active { transform: translateY(2px); border-bottom-width: 1px; }
    .btn-stop { background: var(--accent); color: var(--accent-ink); }

    .bank-tab {
        flex: 1;
        background: var(--panel-bg);
        color: var(--ink-soft);
        border: 1px solid var(--line);
        padding: 8px 0;
        font-size: 11px;
        font-weight: 900;
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 1px;
    }
    .bank-tab.active {
        background: var(--ink);
        color: var(--bg);
        border-color: var(--ink);
    }

    .mpc-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
        background: var(--panel-bg);
        padding: 10px;
        border-radius: 6px;
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.25);
        border: 1px solid var(--line);
        margin-bottom: 8px;
    }

    .pad-container { display: flex; }

    .pad {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 0.82;
        background: var(--pad-bg);
        border: 2px solid var(--pad-border);
        border-bottom: 5px solid var(--pad-bottom);
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        touch-action: manipulation;
    }

    .pad kbd {
        font-size: 13px;
        font-weight: 900;
        color: var(--ink);
        font-family: monospace;
        opacity: 0.85;
    }

    .pad .sound {
        font-size: 7px;
        text-transform: uppercase;
        color: var(--ink);
        margin-top: 3px;
        text-align: center;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 88%;
        opacity: 0.75;
    }

    .pad-add {
        position: absolute;
        top: 3px;
        right: 3px;
        width: 16px;
        height: 16px;
        line-height: 14px;
        padding: 0;
        border: 1px solid var(--pad-border);
        border-radius: 50%;
        background: rgba(0,0,0,0.15);
        color: var(--ink);
        font-size: 11px;
        font-weight: 900;
        cursor: pointer;
    }

    .pad.loaded .pad-add {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
    }

    .pad.playing {
        background: var(--accent) !important;
        border-color: var(--accent) !important;
        border-bottom: 2px solid rgba(0,0,0,0.4) !important;
        transform: translateY(3px);
    }
    .pad.playing kbd, .pad.playing .sound { color: var(--accent-ink) !important; opacity: 1; }

    .pad.empty-flash { animation: shake 0.22s ease; }

    .edit-strip {
        background: var(--panel-bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
        font-family: 'Courier New', Courier, monospace;
    }
    .edit-strip-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
    }
    #editPadLabel {
        font-size: 9px;
        font-weight: bold;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .edit-load-btn {
        background: var(--ink);
        color: var(--bg);
        border: none;
        border-radius: 3px;
        padding: 5px 8px;
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        white-space: nowrap;
    }
    .edit-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 9px;
        font-weight: bold;
        color: var(--ink-soft);
        margin-top: 4px;
    }
    .edit-row span:first-child { width: 32px; }
    .edit-row span:last-child { width: 42px; text-align: right; }
    .edit-row input[type="range"] { flex: 1; accent-color: var(--accent); }

    .waveform-container {
        width: 100%;
        height: 40px;
        background: var(--panel-bg);
        border: 1px solid var(--line);
        border-radius: 4px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    #waveformCanvas { width: 100%; height: 100%; }

    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .modal-content {
        background: var(--device-bg);
        color: var(--ink);
        padding: 16px;
        border-radius: 8px;
        width: 85%;
        max-width: 300px;
        border: 1px solid var(--line);
        font-family: 'Courier New', Courier, monospace;
    }
    .modal-content h3 {
        margin-top: 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .modal-content label {
        font-size: 9px;
        font-weight: bold;
        display: block;
        margin-top: 8px;
    }
    .modal-content input[type="text"] {
        width: 100%;
        padding: 6px;
        box-sizing: border-box;
        font-size: 10px;
        margin-top: 3px;
        border: 1px solid var(--line);
        border-radius: 3px;
        background: var(--bg);
        color: var(--ink);
    }
    .modal-content button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        background: var(--ink);
        color: var(--bg);
        border: none;
        border-radius: 3px;
        font-weight: bold;
        cursor: pointer;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body id="body">

    <div class="device">

        <div class="brand-row">
            <h1>MPC</h1>
            <span>Yeezy Edition</span>
        </div>
        <div class="hazard-bar"></div>

        <div class="screen">
            <div class="screen-row">
                <span>MASTER VOL:</span>
                <input type="range" id="masterVolume" min="0" max="1" step="0.05" value="1" oninput="updateMasterVolume()">
            </div>
            <div class="screen-row">
                <span id="seqStatus">SEQ: READY</span>
                <div class="seq-btns">
                    <button class="btn-seq" id="btnRec" onclick="toggleRecord()">● REC</button>
                    <button class="btn-seq" id="btnLoop" onclick="toggleLoopPlay()">▶ LOOP</button>
                </div>
            </div>
        </div>

        <div class="controls-top">
            <button class="btn-control btn-stop" onclick="stopAllSounds()">⏹ Stop All</button>
            <button class="btn-control" onclick="openSettings()">⚙ Settings</button>
            <button class="btn-control" id="btnColorway" onclick="toggleTheme()">🎨 Colorway: Bone</button>
        </div>

        <div class="bank-tabs" id="bankTabs">
            <button class="bank-tab active" data-bank="A" onclick="switchBank('A')">A</button>
            <button class="bank-tab" data-bank="B" onclick="switchBank('B')">B</button>
            <button class="bank-tab" data-bank="C" onclick="switchBank('C')">C</button>
            <button class="bank-tab" data-bank="D" onclick="switchBank('D')">D</button>
        </div>

        <div class="mpc-grid" id="padGrid"></div>

        <div class="edit-strip">
            <div class="edit-strip-head">
                <span id="editPadLabel">BANK A · PAD 1 — LEER</span>
                <button class="edit-load-btn" onclick="loadSampleForSelected()">Sample laden</button>
            </div>
            <div class="edit-row">
                <span>TUNE</span>
                <input type="range" id="editTune" min="0.5" max="2" step="0.01" value="1" oninput="onEditTune(this.value)">
                <span id="editTuneVal">1.00x</span>
            </div>
            <div class="edit-row">
                <span>VOL</span>
                <input type="range" id="editVol" min="0" max="1" step="0.01" value="1" oninput="onEditVol(this.value)">
                <span id="editVolVal">100%</span>
            </div>
        </div>

        <div class="waveform-container">
            <canvas id="waveformCanvas"></canvas>
        </div>

    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>Projekt-Einstellungen</h3>
            <label>Projektname:</label>
            <input type="text" id="projectNameInput" value="Yeezy_Runaway_Project">
            <label>Stamm-Verzeichnis:</label>
            <input type="text" id="baseDirInput" value="MPC_Projekte/">
            <button onclick="saveProjectSettings()">Übernehmen</button>
            <button onclick="closeSettings()" style="background:var(--accent); color:var(--accent-ink); margin-top: 6px;">Schließen</button>
        </div>
    </div>

    <script>
        let masterVol = 1;
        const soundBuffers = {};
        const padMeta = {};
        let activeSources = {};
        let isRecording = false;
        let isPlayingLoop = false;
        let recStartTime = 0;
        let recordedEvents = [];
        let loopIntervalId = null;
        let currentBank = 'A';
        let selectedPadId = null;
        const padRefs = [];

        const KEY_LAYOUT = ['1','2','3','4','Q','W','E','R','A','S','D','F','Z','X','C','V'];
        const KEYCODES  = [49,50,51,52,81,87,69,82,65,83,68,70,90,88,67,86];
        const KEYCODE_TO_INDEX = {};
        KEYCODES.forEach((kc, i) => { KEYCODE_TO_INDEX[kc] = i; });

        let currentProject = { name: "Yeezy_Runaway_Project", baseDir: "MPC_Projekte/" };

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function saveProjectSettings() {
            currentProject.name = document.getElementById('projectNameInput').value.trim() || "Unbenannt";
            currentProject.baseDir = document.getElementById('baseDirInput').value.trim() || "MPC_Projekte/";
            alert(`Ordner angelegt:\n📂 ${currentProject.baseDir}${currentProject.name}/`);
            closeSettings();
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, analyser;

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.connect(audioCtx.destination);
                setupVisualizer();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getPadMeta(padId) {
            if (!padMeta[padId]) padMeta[padId] = { tune: 1, vol: 1, name: null };
            return padMeta[padId];
        }

        function triggerNativeUpload(padId) {
            initAudioContext();
            
            const existingInput = document.getElementById('dynamicFileInput');
            if (existingInput) existingInput.remove();

            const input = document.createElement('input');
            input.type = 'file';
            input.id = 'dynamicFileInput';
            input.accept = 'audio/*';
            input.style.position = 'fixed';
            input.style.top = '0';
            input.style.left = '0';
            input.style.opacity = '0';
            input.style.pointerEvents = 'none';

            input.onchange = async e => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async function (event) {
                    const base64Data = event.target.result;
                    const displayName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    getPadMeta(padId).name = displayName;

                    try {
                        const response = await fetch(base64Data);
                        const arrayBuffer = await response.arrayBuffer();
                        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                        soundBuffers[padId] = audioBuffer;
                    } catch (err) {
                        console.log("Audio-Dekodierungsfehler:", err);
                    }

                    const ref = padRefs.find(r => r.pad.dataset.pad === padId);
                    if (ref) {
                        ref.soundSpan.textContent = displayName;
                        ref.pad.classList.add('loaded');
                    }
                    if (selectedPadId === padId) updateEditStrip(padId);
                };
                reader.readAsDataURL(file);
                
                setTimeout(() => input.remove(), 500);
            };

            document.body.appendChild(input);
            setTimeout(() => {
                input.click();
            }, 50);
        }

        function setupVisualizer() {
            const canvas = document.getElementById('waveformCanvas');
            const canvasCtx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);

                canvasCtx.fillStyle = getComputedStyle(document.body).getPropertyValue('--panel-bg').trim() || '#b3a683';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#d6491d';
                canvasCtx.beginPath();

                const sliceWidth = canvas.width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }
            draw();
        }

        function updateMasterVolume() { masterVol = parseFloat(document.getElementById('masterVolume').value); }

        function toggleTheme() {
            const black = document.body.classList.toggle('theme-black');
            document.getElementById('btnColorway').textContent = black ? '🎨 Colorway: Black' : '🎨 Colorway: Bone';
        }

        function stopAllSounds() {
            Object.keys(activeSources).forEach(id => {
                if (activeSources[id]) { try { activeSources[id].stop(); } catch (e) {} }
            });
            stopLoopPlay();
        }

        function toggleRecord() {
            initAudioContext();
            const btnRec = document.getElementById('btnRec');
            const seqStatus = document.getElementById('seqStatus');

            if (!isRecording) {
                isRecording = true;
                recordedEvents = [];
                recStartTime = audioCtx.currentTime;
                btnRec.classList.add('recording');
                btnRec.textContent = "■ STOP";
                seqStatus.textContent = "REC...";
                stopLoopPlay();
            } else {
                isRecording = false;
                btnRec.classList.remove('recording');
                btnRec.textContent = "● REC";
                seqStatus.textContent = recordedEvents.length > 0 ? `SAVED (${recordedEvents.length})` : "EMPTY";
            }
        }

        function toggleLoopPlay() {
            initAudioContext();
            const btnLoop = document.getElementById('btnLoop');
            const seqStatus = document.getElementById('seqStatus');

            if (recordedEvents.length === 0) {
                seqStatus.textContent = "NO DATA!";
                return;
            }

            if (!isPlayingLoop) {
                isPlayingLoop = true;
                btnLoop.classList.add('playing-loop');
                btnLoop.textContent = "⏹ STOP";
                seqStatus.textContent = "PLAYING LOOP";

                const lastEventTime = Math.max(...recordedEvents.map(e => e.time));
                const loopDuration = Math.max(lastEventTime + 0.5, 1.0);

                playRecordedSequence();
                loopIntervalId = setInterval(playRecordedSequence, loopDuration * 1000);
            } else {
                stopLoopPlay();
            }
        }

        function stopLoopPlay() {
            isPlayingLoop = false;
            const btnLoop = document.getElementById('btnLoop');
            const seqStatus = document.getElementById('seqStatus');
            btnLoop.classList.remove('playing-loop');
            btnLoop.textContent = "▶ LOOP";
            if (!isRecording) seqStatus.textContent = "STOPPED";
            if (loopIntervalId) { clearInterval(loopIntervalId); loopIntervalId = null; }
        }

        function playRecordedSequence() {
            if (recordedEvents.length === 0) return;
            recordedEvents.forEach(evt => {
                setTimeout(() => {
                    if (!isPlayingLoop) return;
                    const ref = padRefs.find(r => r.pad.dataset.pad === evt.padId);
                    if (ref) {
                        ref.pad.classList.add('playing');
                        setTimeout(() => ref.pad.classList.remove('playing'), 90);
                    }
                    playBuffer(evt.padId);
                }, evt.time * 1000);
            });
        }

        function playBuffer(padId) {
            const buffer = soundBuffers[padId];
            if (!buffer) return;
            const meta = getPadMeta(padId);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.playbackRate.value = meta.tune;

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = meta.vol * masterVol;

            source.connect(gainNode);
            gainNode.connect(analyser);
            source.start(0);
            activeSources[padId] = source;
        }

        function flashEmpty(padElement) {
            padElement.classList.add('empty-flash');
            setTimeout(() => padElement.classList.remove('empty-flash'), 220);
        }

        function triggerPad(padId, padElement, recordIt = true) {
            initAudioContext();
            if (!soundBuffers[padId]) {
                if (padElement) flashEmpty(padElement);
                return;
            }
            if (isRecording && recordIt) {
                recordedEvents.push({ padId: padId, time: audioCtx.currentTime - recStartTime });
            }
            playBuffer(padId);
            if (padElement) {
                padElement.classList.add('playing');
                setTimeout(() => padElement.classList.remove('playing'), 90);
            }
        }

        function handleTap(padId, padElement) {
            selectedPadId = padId;
            updateEditStrip(padId);
            triggerPad(padId, padElement);
        }

        function updateEditStrip(padId) {
            const meta = getPadMeta(padId);
            const bank = padId.charAt(0);
            const idx = parseInt(padId.slice(1), 10) - 1;
            const keyLabel = KEY_LAYOUT[idx] !== undefined ? KEY_LAYOUT[idx] : '?';
            document.getElementById('editPadLabel').textContent = `BANK ${bank} · PAD ${keyLabel} — ${meta.name || 'LEER'}`;
            document.getElementById('editTune').value = meta.tune;
            document.getElementById('editTuneVal').textContent = meta.tune.toFixed(2) + 'x';
            document.getElementById('editVol').value = meta.vol;
            document.getElementById('editVolVal').textContent = Math.round(meta.vol * 100) + '%';
        }

        function onEditTune(v) {
            if (!selectedPadId) return;
            const val = parseFloat(v);
            getPadMeta(selectedPadId).tune = val;
            document.getElementById('editTuneVal').textContent = val.toFixed(2) + 'x';
        }

        function onEditVol(v) {
            if (!selectedPadId) return;
            const val = parseFloat(v);
            getPadMeta(selectedPadId).vol = val;
            document.getElementById('editVolVal').textContent = Math.round(val * 100) + '%';
        }

        function loadSampleForSelected() {
            if (selectedPadId) triggerNativeUpload(selectedPadId);
        }

        function refreshPadDisplay() {
            padRefs.forEach((ref, i) => {
                const padId = currentBank + String(i + 1).padStart(2, '0');
                ref.pad.dataset.pad = padId;
                const meta = padMeta[padId];
                ref.soundSpan.textContent = (meta && meta.name) ? meta.name : 'LEER';
                ref.pad.classList.toggle('loaded', !!(meta && meta.name));
            });
            document.querySelectorAll('.bank-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.bank === currentBank);
            });
        }

        function switchBank(letter) {
            currentBank = letter;
            refreshPadDisplay();
        }

        function buildPadGrid() {
            const grid = document.getElementById('padGrid');
            grid.innerHTML = '';
            padRefs.length = 0;

            KEY_LAYOUT.forEach(() => {
                const container = document.createElement('div');
                container.className = 'pad-container';

                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.innerHTML = '<button class="pad-add" type="button" aria-label="Sound laden">+</button><kbd></kbd><span class="sound">LEER</span>';

                container.appendChild(pad);
                grid.appendChild(container);

                const soundSpan = pad.querySelector('.sound');
                const addBtn = pad.querySelector('.pad-add');
                padRefs.push({ container, pad, soundSpan, addBtn });

                pad.addEventListener('touchstart', e => { e.preventDefault(); handleTap(pad.dataset.pad, pad); }, { passive: false });
                pad.addEventListener('mousedown', () => handleTap(pad.dataset.pad, pad));

                addBtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); triggerNativeUpload(pad.dataset.pad); }, { passive: false });
                addBtn.addEventListener('click', e => { e.stopPropagation(); triggerNativeUpload(pad.dataset.pad); });
            });

            padRefs.forEach((ref, i) => {
                ref.pad.querySelector('kbd').textContent = KEY_LAYOUT[i];
            });
        }

        window.addEventListener('keydown', e => {
            if (e.repeat) return;
            const idx = KEYCODE_TO_INDEX[e.keyCode];
            if (idx === undefined) return;
            const ref = padRefs[idx];
            if (ref) handleTap(ref.pad.dataset.pad, ref.pad);
        });

        buildPadGrid();
        switchBank('A');
        selectedPadId = 'A01';
        updateEditStrip(selectedPadId);
    </script>
</body>
</html>
