<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akai MPC 2000 - Yeezy Edition</title>
    <style>
        :root {
            --bg-color: #d1cfc1;
            --grid-bg: #b5b3a4;
            --pad-bg: #8c8c8c;
            --pad-border: #6e6e6e;
            --pad-bottom: #525252;
            --text-color: #222;
            --kbd-color: #111;
            --screen-bg: #5f734c;
            --screen-text: #111a0d;
        }

        body.dark-mode {
            --bg-color: #181818;
            --grid-bg: #242424;
            --pad-bg: #383838;
            --pad-border: #4f4f4f;
            --pad-bottom: #1c1c1c;
            --text-color: #eee;
            --kbd-color: #fff;
            --screen-bg: #0c140a;
            --screen-text: #4ade80;
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 6px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none; 
            width: 100vw;
            overflow-x: hidden;
        }

        .screen {
            background-color: var(--screen-bg);
            border: 4px solid #444;
            border-top-color: #222;
            border-left-color: #222;
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 6px;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
            text-align: center;
            width: 96%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .screen h1 { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 13px;
            letter-spacing: 1px; 
            color: var(--screen-text);
            text-transform: uppercase;
            font-weight: 900;
        }

        .screen-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8px;
            color: var(--screen-text);
            font-weight: bold;
            gap: 4px;
        }

        .screen-row input[type="range"] {
            width: 100px;
        }

        .seq-btns {
            display: flex;
            gap: 4px;
        }

        .btn-seq {
            background: #2a3821;
            color: #4ade80;
            border: 1px solid #111;
            padding: 4px 8px;
            font-size: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
        }
        .btn-seq.recording {
            background: #dc2626;
            color: #fff;
            animation: pulse 1s infinite;
        }
        .btn-seq.playing-loop {
            background: #ca8a04;
            color: #fff;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .controls-top {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            width: 96%;
            max-width: 450px;
            justify-content: center;
        }

        .btn-control {
            background: #555;
            color: #fff;
            border: 1px solid #333;
            border-bottom: 3px solid #222;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
        }
        .btn-control:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }
        .btn-stop {
            background: #991b1b;
        }

        .mpc-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: var(--grid-bg); 
            padding: 10px;
            border-radius: 6px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.3), 0 6px 15px rgba(0,0,0,0.15);
            border: 2px solid #999;
            width: 96%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .pad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.06);
            padding: 4px;
            border-radius: 4px;
        }

        .pad {
            width: 100%;
            height: 60px;
            background: var(--pad-bg); 
            border: 2px solid var(--pad-border);
            border-bottom: 5px solid var(--pad-bottom); 
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .pad kbd { 
            font-size: 14px; 
            font-weight: 900; 
            color: var(--kbd-color); 
            font-family: monospace;
        }

        .pad .sound { 
            font-size: 7px; 
            text-transform: uppercase; 
            color: var(--text-color); 
            margin-top: 2px; 
            text-align: center; 
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        .pad.playing {
            background: #f97316 !important; 
            border-color: #c2410c !important;
            border-bottom: 2px solid #7c2d12 !important; 
            transform: translateY(3px); 
        }

        .pad.playing kbd, .pad.playing .sound { 
            color: #fff !important; 
        }

        .pad-settings {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 3px;
        }

        .pad-settings select {
            font-size: 8px;
            padding: 2px;
            background: var(--screen-bg);
            color: var(--screen-text);
            border: 1px solid #444;
            border-radius: 2px;
            width: 100%;
        }

        .upload-btn-label {
            margin-top: 3px;
            font-size: 8px;
            background: #444;
            color: #fff;
            padding: 3px 0;
            border-radius: 2px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            width: 100%;
            display: block;
        }
        .file-input {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            border-radius: 6px;
            width: 85%;
            max-width: 300px;
            border: 2px solid #555;
            font-family: 'Courier New', Courier, monospace;
        }
        .modal-content h3 {
            margin-top: 0;
            font-size: 12px;
            text-transform: uppercase;
        }
        .modal-content label {
            font-size: 9px;
            font-weight: bold;
            display: block;
            margin-top: 6px;
        }
        .modal-content input[type="text"] {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
            font-size: 9px;
            margin-top: 3px;
        }
        .modal-content button {
            margin-top: 10px;
            width: 100%;
            padding: 6px;
            background: #555;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 9px;
            text-transform: uppercase;
        }

        .waveform-container {
            width: 96%;
            max-width: 450px;
            height: 40px;
            background: var(--grid-bg);
            border: 2px solid #999;
            border-radius: 4px;
            margin-top: 6px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #waveformCanvas {
            width: 100%;
            height: 100%;
            border-radius: 2px;
        }
    </style>
</head>
<body id="body">

    <div class="screen">
        <h1>MIDI PRODUCTION CENTER</h1>
        <div class="screen-row">
            <span>MASTER VOL:</span>
            <input type="range" id="masterVolume" min="0" max="1" step="0.05" value="1" oninput="updateMasterVolume()">
        </div>
        <div class="screen-row" style="margin-top: 6px; border-top: 1px dashed #3a4a30; padding-top: 4px;">
            <span id="seqStatus">SEQ: READY</span>
            <div class="seq-btns">
                <button class="btn-seq" id="btnRec" onclick="toggleRecord()">● REC</button>
                <button class="btn-seq" id="btnLoop" onclick="toggleLoopPlay()">▶ LOOP</button>
            </div>
        </div>
    </div>

    <div class="controls-top">
        <button class="btn-control btn-stop" onclick="stopAllSounds()">⏹ STOP ALL</button>
        <button class="btn-control" onclick="openSettings()">⚙ SETTINGS</button>
        <button class="btn-control" onclick="toggleTheme()">🎨 SKIN</button>
    </div>

    <div class="mpc-grid">
        <script>
            const keys = ['81', '87', '69', '65', '83', '68', '89', '88', '67'];
            const labels = ['Q', 'W', 'E', 'A', 'S', 'D', 'Y', 'X', 'C'];
            
            keys.forEach((key, index) => {
                document.write(`
                    <div class="pad-container">
                        <div data-key="${key}" class="pad"><kbd>${labels[index]}</kbd><span class="sound">Leer</span></div>
                        <div class="pad-settings">
                            <select id="pitch-${key}">
                                <option value="0.5">0.5x</option>
                                <option value="1" selected>1.0x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2">2.0x</option>
                            </select>
                        </div>
                        <input type="range" id="vol-${key}" min="0" max="1" step="0.1" value="1" style="width: 100%; margin-top: 2px;">
                        <label class="upload-btn-label">Sound +<input type="file" class="file-input" data-key="${key}" accept="audio/*"></label>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="waveform-container">
        <canvas id="waveformCanvas"></canvas>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>Projekt-Einstellungen</h3>
            <label>Projektname:</label>
            <input type="text" id="projectNameInput" value="Yeezy_Runaway_Project">
            <label>Stamm-Verzeichnis:</label>
            <input type="text" id="baseDirInput" value="MPC_Projekte/">
            <button onclick="saveProjectSettings()">Übernehmen</button>
            <button onclick="closeSettings()" style="background:#333; margin-top: 3px;">Schließen</button>
        </div>
    </div>

    <script>
        let masterVol = 1;
        const soundBuffers = {}; 
        let activeSources = {}; 
        let isRecording = false;
        let isPlayingLoop = false;
        let recStartTime = 0;
        let recordedEvents = []; 
        let loopIntervalId = null;

        let currentProject = { name: "Yeezy_Runaway_Project", baseDir: "MPC_Projekte/" };

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function saveProjectSettings() {
            currentProject.name = document.getElementById('projectNameInput').value.trim() || "Unbenannt";
            currentProject.baseDir = document.getElementById('baseDirInput').value.trim() || "MPC_Projekte/";
            alert(`Ordner angelegt:\n📂 ${currentProject.baseDir}${currentProject.name}/`);
            closeSettings();
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, analyser;

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.connect(audioCtx.destination);
                setupVisualizer();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setupVisualizer() {
            const canvas = document.getElementById('waveformCanvas');
            const canvasCtx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteTimeDomainData(dataArray);

                canvasCtx.fillStyle = getComputedStyle(document.body).getPropertyValue('--grid-bg').trim() || '#b5b3a4';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--text-color').trim() || '#222';
                canvasCtx.beginPath();

                const sliceWidth = canvas.width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }
            draw();
        }

        function updateMasterVolume() { masterVol = document.getElementById('masterVolume').value; }
        function toggleTheme() { document.getElementById('body').classList.toggle('dark-mode'); }

        function stopAllSounds() {
            Object.keys(activeSources).forEach(key => {
                if (activeSources[key]) { try { activeSources[key].stop(); } catch(e) {} }
            });
            stopLoopPlay();
        }

        function toggleRecord() {
            initAudioContext();
            const btnRec = document.getElementById('btnRec');
            const seqStatus = document.getElementById('seqStatus');

            if (!isRecording) {
                isRecording = true;
                recordedEvents = [];
                recStartTime = audioCtx.currentTime;
                btnRec.classList.add('recording');
                btnRec.textContent = "■ STOP";
                seqStatus.textContent = "REC...";
                stopLoopPlay();
            } else {
                isRecording = false;
                btnRec.classList.remove('recording');
                btnRec.textContent = "● REC";
                seqStatus.textContent = recordedEvents.length > 0 ? `SAVED (${recordedEvents.length})` : "EMPTY";
            }
        }

        function toggleLoopPlay() {
            initAudioContext();
            const btnLoop = document.getElementById('btnLoop');
            const seqStatus = document.getElementById('seqStatus');

            if (recordedEvents.length === 0) {
                seqStatus.textContent = "NO DATA!";
                return;
            }

            if (!isPlayingLoop) {
                isPlayingLoop = true;
                btnLoop.classList.add('playing-loop');
                btnLoop.textContent = "⏹ STOP";
                seqStatus.textContent = "PLAYING LOOP";

                const lastEventTime = Math.max(...recordedEvents.map(e => e.time));
                const loopDuration = Math.max(lastEventTime + 0.5, 1.0);

                playRecordedSequence();
                loopIntervalId = setInterval(playRecordedSequence, loopDuration * 1000);
            } else {
                stopLoopPlay();
            }
        }

        function stopLoopPlay() {
            isPlayingLoop = false;
            const btnLoop = document.getElementById('btnLoop');
            const seqStatus = document.getElementById('seqStatus');
            btnLoop.classList.remove('playing-loop');
            btnLoop.textContent = "▶ LOOP";
            if(!isRecording) seqStatus.textContent = "STOPPED";
            if (loopIntervalId) { clearInterval(loopIntervalId); loopIntervalId = null; }
        }

        function playRecordedSequence() {
            if (recordedEvents.length === 0) return;
            recordedEvents.forEach(event => {
                setTimeout(() => {
                    if (!isPlayingLoop) return; 
                    const pad = document.querySelector(`.pad[data-key="${event.keyCode}"]`);
                    if (pad) triggerPad(event.keyCode, pad, false); 
                }, event.time * 1000);
            });
        }

        document.querySelectorAll('.file-input').forEach(input => {
            input.addEventListener('change', async function(e) {
                initAudioContext();
                const file = e.target.files[0];
                if (!file) return;

                const keyCode = this.getAttribute('data-key');
                const soundSpan = document.querySelector(`.pad[data-key="${keyCode}"] .sound`);

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    soundBuffers[keyCode] = audioBuffer;
                    soundSpan.textContent = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                } catch (err) { console.log(err); }
            });
        });

        function triggerPad(keyCode, padElement, recordIt = true) {
            initAudioContext();
            const buffer = soundBuffers[keyCode];
            if (!buffer) return; 

            if (isRecording && recordIt) {
                recordedEvents.push({ keyCode: keyCode, time: audioCtx.currentTime - recStartTime });
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.playbackRate.value = parseFloat(document.getElementById(`pitch-${keyCode}`).value);

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(document.getElementById(`vol-${keyCode}`).value) * masterVol;

            source.connect(gainNode);
            gainNode.connect(analyser);
            source.start(0);
            activeSources[keyCode] = source;

            padElement.classList.add('playing');
            setTimeout(() => padElement.classList.remove('playing'), 80);
        }

        window.addEventListener('keydown', (e) => {
            const pad = document.querySelector(`.pad[data-key="${e.keyCode}"]`);
            if (pad) triggerPad(e.keyCode.toString(), pad);
        });

        document.querySelectorAll('.pad').forEach(pad => {
            const keyCode = pad.getAttribute('data-key');
            pad.addEventListener('touchstart', (e) => { e.preventDefault(); triggerPad(keyCode, pad); }, {passive: false});
            pad.addEventListener('mousedown', () => triggerPad(keyCode, pad));
        });
    </script>
</body>
</html>
